<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Save The Date - Arif & Aisyah</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@200;300;400&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden; /* Dikunci sebelum dibuka */
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            position: relative;
        }

        section {
            height: 100vh;
            width: 100%;
            position: relative;
            background-image: url('https://i.ibb.co.com/mCvrrQrN/Desain-tanpa-judul-5.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 60px 20px 30px 20px; /* Padding bawah dikurangi untuk HFZ Company */
            text-align: center;
        }

        /* VIGNETTE & GRADASI PEKAT */
        section::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle, rgba(0,0,0,0) 10%, rgba(0,0,0,0.95) 100%),
                linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 25%, transparent 70%, rgba(0,0,0,0.95) 100%);
            z-index: 1;
        }

        .inner-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* TYPOGRAPHY */
        .top-info { animation: fadeInDown 1.5s ease-out; }
        .days-container { display: flex; justify-content: center; align-items: baseline; font-family: 'Playfair Display', serif; }
        .number { font-size: 85px; font-weight: 400; letter-spacing: -4px; line-height: 0.8; }
        .days-text-group { text-align: left; margin-left: 10px; line-height: 0.9; }
        .days-word { display: block; font-size: 38px; }
        .to-go { display: block; font-size: 26px; font-weight: 300; }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 55px;
            /* Posisi nama dinaikkan lebih tinggi lagi */
            margin-top: -220px; 
            animation: floating 4s ease-in-out infinite;
            text-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .btn-open {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255,255,255,0.8);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 13px;
            letter-spacing: 3px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .hfz-footer {
            font-size: 9px;
            letter-spacing: 5px;
            opacity: 0.5;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: 300;
        }

        /* HALAMAN ISI (Hidden initially) */
        #isi-undangan {
            display: none;
            background-color: #000;
        }

        .info-card {
            background: rgba(0,0,0,0.5);
            padding: 40px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
        }

        .info-card h3 { font-family: 'Great Vibes', cursive; font-size: 45px; margin-bottom: 20px; color: #d4af37; }
        .label { text-transform: uppercase; letter-spacing: 4px; font-size: 11px; color: #d4af37; display: block; margin-top: 25px; }
        .val { font-family: 'Playfair Display', serif; font-size: 18px; line-height: 1.6; margin-top: 5px; }

        /* ANIMATIONS */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes floating { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* MOBILE FIXES */
        @media (max-height: 700px) {
            .names { margin-top: -200px; font-size: 45px; }
            .number { font-size: 70px; }
        }
    </style>
</head>
<body>

    <audio id="weddingMusic" loop>
        <source src="https://raw.githubusercontent.com/fizkers/Prewedding_Arif-Aisyah/refs/heads/main/Wedding%20Nasheed%20-%20Muhammad%20Al%20Muqit%20Lyrics%20Arabic%20Terjemahan%20%F0%9D%98%88%F0%9D%98%B3%F0%9D%98%A2%F0%9D%98%A3%F0%9D%98%AA%F0%9D%98%A4%20%F0%9D%98%95%F0%9D%98%A2%F0%9D%98%B4%F0%9D%98%A9%F0%9D%98%A6%F0%9D%98%A6%F0%9D%98%A5%20%D9%85%D8%AD%D9%85%D8%AF%20%D8%A7%D9%84%D9%85%D9%82%D9%8A%D8%B7.mp3" type="audio/mpeg">
    </audio>

    <div class="main-container">
        
        <section id="cover-page">
            <div class="inner-content">
                <div class="top-info">
                    <div class="days-container">
                        <span class="number" id="days-val">000</span>
                        <div class="days-text-group">
                            <span class="days-word">Days</span>
                            <span class="to-go">To Go</span>
                        </div>
                    </div>
                </div>

                <div class="names">Arif & Aisyah</div>

                <div style="margin-bottom: 10px;">
                    <button class="btn-open" onclick="openInvitation()">Buka Undangan</button>
                    <p style="font-size: 10px; letter-spacing: 4px; opacity: 0.7; margin: 15px 0;">SAVE THE DATE</p>
                    <p class="hfz-footer">HFZ Company</p>
                </div>
            </div>
        </section>

        <section id="isi-undangan">
            <div class="inner-content" style="justify-content: center;">
                <div class="info-card">
                    <h3>Arif & Aisyah</h3>
                    <p style="font-size: 13px; font-weight: 200; margin-bottom: 10px;">Mengharap doa & restu Anda pada acara kami:</p>
                    
                    <span class="label">Waktu</span>
                    <p class="val">Sabtu, 13 April 2027<br>09.00 WIB - Selesai</p>
                    
                    <span class="label">Lokasi</span>
                    <p class="val" style="font-size: 15px;">Gampong Kunyet Mule, Kec. Matangkuli, Kab. Aceh Utara, Aceh</p>
                    
                    <button class="btn-open" style="margin-top: 35px; font-size: 10px;" onclick="window.open('https://maps.google.com/?q=Gampong+Kunyet+Mule+Matangkuli')">Lihat Lokasi</button>
                    <p class="hfz-footer" style="margin-top: 40px;">HFZ Company</p>
                </div>
            </div>
        </section>

    </div>

    <script>
        function openInvitation() {
            const music = document.getElementById('weddingMusic');
            music.play().catch(e => console.log("Audio play blocked"));

            const content = document.getElementById('isi-undangan');
            content.style.display = 'flex';

            document.body.style.overflow = 'auto';
            document.documentElement.style.overflow = 'auto';
            content.scrollIntoView({ behavior: 'smooth' });
        }

        function updateCountdown() {
            const weddingDate = new Date("April 13, 2027 00:00:00").getTime();
            const now = new Date().getTime();
            const diff = weddingDate - now;
            const daysLeft = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("days-val").innerText = diff > 0 ? daysLeft : "0";
        }

        updateCountdown();
    </script>
</body>
</html>
